; ============================================================
;  KnoQ Smart Bat V1 — PlatformIO project config
;  Framework: Arduino
;  Board:     ESP32 Dev Module
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Libraries
lib_deps =
    ; BLE is built into ESP32 Arduino core — no extra lib needed
    ; Wire is built-in for I2C

; Build flags — increase stack for BLE
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=0

; Partition scheme with enough room for BLE
board_build.partitions = min_spiffs.csv
