name: knoq_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_messaging: ^15.0.0
  firebase_remote_config: ^5.0.0
  dio: ^5.5.0
  
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.3.1
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  wakelock_plus: ^1.2.8
  intl: ^0.20.2
  url_launcher: ^6.3.0
  image_picker: ^1.2.1
  pdf: ^3.12.0
  printing: ^5.14.3
  screenshot: ^3.0.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  camera: ^0.12.0+1
  video_player: ^2.11.1
  google_mlkit_pose_detection: ^0.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.10
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 26

flutter_native_splash:
  color: "#0F172A"
  image: assets/images/app_icon.png
  android: true
  ios: true
  android_12:
    color: "#0F172A"
    image: assets/images/app_icon.png
